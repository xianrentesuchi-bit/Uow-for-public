<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Code Runner</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Consolas, Monaco, monospace;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 16px;
      margin: 0;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .editors {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 8px;
    }

    .editor {
      display: flex;
      flex-direction: column;
      background: #020617;
      border-radius: 8px;
      overflow: hidden;
    }

    .editor label {
      padding: 6px 10px;
      font-size: 12px;
      background: #020617;
      color: #93c5fd;
      border-bottom: 1px solid #1e293b;
    }

    textarea {
      flex: 1;
      background: #020617;
      color: #e5e7eb;
      border: none;
      padding: 10px;
      resize: none;
      outline: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>💻 Code Runner</h1>
    <button onclick="runCode()">▶ 実行</button>
  </header>

  <div class="editors">
    <div class="editor">
      <label>HTML</label>
      <textarea id="html">
<h1>Hello World</h1>
<p>HTMLが表示されます</p>
      </textarea>
    </div>

    <div class="editor">
      <label>CSS</label>
      <textarea id="css">
body {
  background: #111827;
  color: #38bdf8;
  font-family: sans-serif;
}
      </textarea>
    </div>

    <div class="editor">
      <label>JavaScript</label>
      <textarea id="js">
console.log("Hello JavaScript!");
      </textarea>
    </div>
  </div>

  <script>
    function runCode() {
      const html = document.getElementById("html").value;
      const css = document.getElementById("css").value;
      const js = document.getElementById("js").value;

      const result = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>${css}</style>
</head>
<body>
${html}
<script>
${js}
<\/script>
</body>
</html>
      `;

      const win = window.open();
      win.document.open();
      win.document.write(result);
      win.document.close();
    }
  </script>
</body>
</html>
